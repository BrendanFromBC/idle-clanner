server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — React Router routes like /market or /loot are not real
    # files, so unmatched paths must fall back to index.html and let the
    # client-side router take over (otherwise refreshing on a non-root route
    # 404s on this server).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
